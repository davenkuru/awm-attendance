<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Discipleship Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('awm_theme')||'dark');})()</script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode" style="position:absolute;top:16px;right:16px;">🌙</button>
    <div class="logo"><img src="img/awm-color.png" alt="AWM Logo" style="width:90px;height:90px;object-fit:contain;" /></div>
    <h1 id="login-title">Sign In</h1>
    <p>Discipleship Class Management</p>

    <!-- Role selector -->
    <div class="role-selector">
      <button class="role-btn active" id="role-admin" onclick="selectRole('admin')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
        Admin
      </button>
      <button class="role-btn" id="role-coordinator" onclick="selectRole('coordinator')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Coordinator
      </button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<style>
.login-card { position: relative; }
.role-selector {
  display: flex; gap: 10px; margin-bottom: 22px;
}
.role-btn {
  flex: 1; display: flex; align-items: center; justify-content: center; gap: 7px;
  padding: 11px 10px; border-radius: 10px;
  border: 1.5px solid var(--border);
  background: transparent; color: var(--text-muted);
  font-size: 13px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all .15s;
}
.role-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
.role-btn.active {
  border-color: var(--gold); color: var(--gold);
  background: rgba(200,169,110,0.08);
}
.role-btn:hover:not(.active) { border-color: rgba(200,169,110,0.4); color: var(--text); }
</style>

<script src="js/config.js"></script>
<script src="js/theme.js"></script>
<script src="js/login.js"></script>
</body>
</html>
