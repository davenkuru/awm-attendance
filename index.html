<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no" />
  <title>Discipleship Class — Attendance</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <!-- Anti-flash: apply saved theme before any CSS renders -->
  <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('awm_theme')||'dark');})()</script>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/attendance.css">
</head>
<body>
<div class="shell">
  <div class="band"></div>
  <header class="top">
    <div class="brand">
      <span class="mark utility">Discipleship Classes</span>
      <h1>Attendance</h1>
      <div class="sub" id="header-date">Loading…</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <a href="login.html" class="report-btn">Report →</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle light/dark mode">🌙</button>
    </div>
  </header>
  <main id="main"></main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/theme.js"></script>
<script src="js/attendance.js"></script>
</body>
</html>
